name: 🚀 Deploy Infraestrutura para DEV

on:
  push:
    branches:
      - developer  # Gatilho: merge/push na branch de desenvolvimento

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Terraform para AWS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      TF_WORKING_DIR: ./terraform

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # ajuste se usa outra versão

      - name: 🔨 Build do projeto Java (gera o .jar)
        run: |
          mvn clean package -DskipTests

      - name: 🧰 Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🏗️ Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: 🔧 Inicializar Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: ✅ Validar plano Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color

      - name: 🚀 Aplicar alterações Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false
